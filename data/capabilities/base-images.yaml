# Extended detail for Base Images
sections:
  - title: "Image Strategy"
    content: "Meridian Corp maintains a curated set of base images for all containerized workloads. Images are built weekly from upstream sources, scanned with Trivy, and published to private ECR registries. Teams consume these images via golden path Dockerfiles — no direct pulls from Docker Hub or public registries in production."
  - title: "CVE Policy"
    content: "Critical CVEs trigger an emergency rebuild within 24 hours. High CVEs are patched in the next weekly build. Medium and low CVEs are tracked and addressed in monthly maintenance windows. The goal is zero critical CVEs across all production images at all times."
  - title: "Migration Support"
    content: "When a new major version is released (e.g., Java 21 → Java 25), PE provides migration guides, updated golden path templates, and a 90-day transition window. The old version enters 'sunset' status with security-only patches."

