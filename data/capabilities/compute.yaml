# Extended detail for Compute Platform
sections:
  - title: "Architecture"
    content: "Meridian Corp runs dedicated EKS clusters per customer — no multi-tenancy across customer boundaries. Each cluster runs Kubernetes 1.30 with Istio service mesh, Karpenter for node autoscaling, and AWS Load Balancer Controller for ingress. Clusters are provisioned via Terraform and managed by the compute plane."
  - title: "Node Groups"
    content: "Standard node groups use m6i.xlarge (4 vCPU, 16 GB) for general workloads and c6i.2xlarge (8 vCPU, 16 GB) for compute-intensive jobs. GPU nodes (g5.xlarge) are available on request for ML inference workloads. All nodes run Amazon Linux 2023 with hardened AMIs rebuilt weekly."
  - title: "Scaling"
    content: "Karpenter handles node autoscaling with provisioner configs per workload class. HPA is configured by default for all deployments. Cluster autoscaler is deprecated — migration to Karpenter completed Q4 2025."

