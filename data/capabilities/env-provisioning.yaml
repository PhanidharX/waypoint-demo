# Extended detail for Environment Provisioning & Delivery
sections:
  - title: "How It Works"
    content: "Teams request environments through #pe-intake. Golden path environments — pre-wired with VPC, namespaces, secrets, and CI/CD — ship within 48 hours. Custom configurations requiring new VPCs or cross-account networking go through architecture review and typically take 10 business days due to upstream network approvals."
  - title: "Golden Path Stack"
    content: "Each golden path environment includes: dedicated EKS namespace, pre-configured Istio sidecar injection, Vault secret mounts (auto-rotated), Concourse pipeline wiring, Grafana dashboard provisioning, and DNS entries in Route 53 private hosted zones."
  - title: "What's Coming"
    content: "Self-service environment creation via Backstage plugin (Q2 2026). This will eliminate the intake step for golden path environments entirely, reducing provisioning to under 15 minutes."

